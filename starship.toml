format = """
$username\
$hostname\
$directory\
$git_branch\
$git_state\
$git_status\
$cmd_duration\
$line_break\
$character"""

[directory]
style = "#d19c97 bold"

[character]
success_symbol = "[έζψ](#899F6B)"
error_symbol = "[έζψ](#d19c97)"
vimcmd_symbol = "[έζχ](green)"

[git_branch]
format = "[$branch]($style)"
style = "bright-black"

[git_status]
format = "[[(*$conflicted$untracked$modified$staged$renamed$deleted)](218) ($ahead_behind$stashed)]($style)"
style = "#FEBE98"
conflicted = "έΑΜ"
untracked = "έΑΜ"
modified = "έΑΜ"
staged = "έΑΜ"
renamed = "έΑΜ"
deleted = "έΑΜ"
stashed = "έΚκ"

[git_state]
format = '\([$state( $progress_current/$progress_total)]($style)\) '
style = "bright-black"

[cmd_duration]
format = "[$duration]($style) "
style = "yellow"
