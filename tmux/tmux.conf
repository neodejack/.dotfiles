set-option -sa terminal-overrides ",xterm*:Tc" 
set -g mouse on

# fast reload tmux config file
bind r source-file ~/.config/tmux/tmux.conf \; display "Reloaded!"


# remap prefix to Control + a
set -g prefix C-s
unbind C-b
bind C-s send-prefix

# Start windows and panes at 1, not 0 set -g base-index 1
set -g pane-base-index 1
set-window-option -g pane-base-index 1
set-option -g renumber-windows on

# Shift Alt vim keys to switch windows
bind -n M-, previous-window
bind -n M-. next-window

# Ctrl Shift Arrow to move window left or right
bind-key -n M-< swap-window -t -1\; select-window -t -1
bind-key -n M-> swap-window -t +1\; select-window -t +1

# Vim style pane selection
# we usually use 'Ctrl + h,j,k,l' to switch pane (powered by the plugin 'christoomey/vim-tmux-navigator')
# but if we are in a vim/nvim/vi buffer, we can't use that
# so the following 4 bindings allow us to use <prefix> + h,j,k,l to switch pane even when we are in a vim buffer
bind h select-pane -L
bind j select-pane -D 
bind k select-pane -U
bind l select-pane -R

# Create new pane in the same CWD
unbind 's'
bind 's' split-window -v -c "#{pane_current_path}"
bind 'v' split-window -h -c "#{pane_current_path}"

# List of plugins
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'dreamsofcode-io/catppuccin-tmux'
set -g @plugin 'tmux-plugins/tmux-yank'
set -g @plugin 'tmux-plugins/tmux-resurrect'


# Keybinding for Copy Mode and tmux-yank
# set vi-mode
set-window-option -g mode-keys vi
# keybindings
bind-key -T copy-mode-vi v send-keys -X begin-selection
bind-key -T copy-mode-vi C-v send-keys -X rectangle-toggle
bind-key -T copy-mode-vi y send-keys -X copy-selection-and-cancel



# Initialize TMUX plugin manager (keep this line at the very bottom of tmux.conf)
run '~/.tmux/plugins/tpm/tpm'
